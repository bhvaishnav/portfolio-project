<section class="contact" id="contact-section">
  <h2 class="section-title fade-in-up">Get In <span class="neon-text">Touch</span></h2>

  <div class="contact__grid">
    <!-- Contact Info -->
    <div class="glass-card contact__info fade-in-up" id="contact-info">
      <h3>Contact Info</h3>
      <ul class="contact-list">
        <li>
          <span class="contact-list__icon">📧</span>
          <a href="mailto:231260116063setiit@gmail.com">231260116063setiit@gmail.com</a>
        </li>
        <li>
          <span class="contact-list__icon">📍</span>
          <span>India</span>
        </li>
        <li>
          <span class="contact-list__icon">🔗</span>
          <a href="https://www.linkedin.com/in/bhavesh-vaishnav-14a384324" target="_blank" rel="noopener">LinkedIn</a>
        </li>
        <li>
          <span class="contact-list__icon">💻</span>
          <a href="https://github.com/bhvaishnav" target="_blank" rel="noopener">GitHub</a>
        </li>
      </ul>
    </div>

    <!-- Contact Form -->
    <div class="glass-card contact__form-card fade-in-up" id="contact-form-card">
      <h3>Send a Message</h3>

      <form ng-submit="sendMessage()" id="contact-form" ng-if="!submitted">
        <div class="form-group">
          <label for="cf-name">Name</label>
          <input type="text" id="cf-name" ng-model="formData.name" placeholder="Your name" required>
        </div>
        <div class="form-group">
          <label for="cf-email">Email</label>
          <input type="email" id="cf-email" ng-model="formData.email" placeholder="you@example.com" required>
        </div>
        <div class="form-group">
          <label for="cf-message">Message</label>
          <textarea id="cf-message" ng-model="formData.message" rows="5" placeholder="Your message…" required></textarea>
        </div>
        <button type="submit" class="btn btn--primary btn--block" id="contact-submit">Send Message</button>
      </form>

      <div class="success-message" ng-if="submitted" id="contact-success">
        <div class="success-icon">✅</div>
        <h3>Message Sent!</h3>
        <p>Thank you for reaching out. I'll get back to you soon.</p>
      </div>
    </div>
  </div>
</section>
